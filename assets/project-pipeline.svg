<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 20px;
        fill: #ffffff;
      }
      
      .desc {
        font-family: 'Outfit', sans-serif;
        font-weight: 400;
        font-size: 13px;
        fill: #98a6b8;
      }
      
      .tech {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #ffb199;
      }
      
      .status {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #4facfe;
      }

      .card-bg {
        fill: #0d1117;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 1.5;
        rx: 12px;
      }

      .glow {
        filter: blur(15px);
        opacity: 0.15;
      }
    </style>
    
    <linearGradient id="glowGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>
  </defs>

  <!-- Glowing background -->
  <rect x="10" y="10" width="380" height="140" fill="url(#glowGrad2)" class="glow" rx="12" />
  
  <!-- Base Card -->
  <rect x="0" y="0" width="400" height="160" class="card-bg" />

  <!-- Content -->
  <g transform="translate(24, 28)">
    <!-- Icon/Emblem -->
    <rect width="36" height="36" rx="8" fill="rgba(255, 8, 68, 0.1)" stroke="rgba(255, 8, 68, 0.3)" stroke-width="1" />
    <!-- Molecular dynamic bonds icon -->
    <circle cx="13" cy="18" r="4" fill="#ff0844" />
    <circle cx="25" cy="12" r="3.5" fill="#ffb199" />
    <circle cx="23" cy="25" r="3" fill="#ffb199" />
    <line x1="13" y1="18" x2="25" y2="12" stroke="white" stroke-width="1.5" />
    <line x1="13" y1="18" x2="23" y2="25" stroke="white" stroke-width="1.5" />

    <!-- Project Info -->
    <text x="50" y="24" class="title">Drug Discovery Pipeline</text>
    <text x="290" y="22" class="status">● Screening</text>

    <text x="0" y="62" class="desc">Early-stage drug discovery pipeline for virtual screening,</text>
    <text x="0" y="80" class="desc">rescoring, statistics, and high-performance computing.</text>

    <!-- Tech Stack Pill -->
    <g transform="translate(0, 102)">
      <rect width="352" height="24" rx="6" fill="#161b22" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
      <text x="12" y="16" class="tech">Python • Conda • HPC • AutoDock • DiffDock</text>
    </g>
  </g>
</svg>
