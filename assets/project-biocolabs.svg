<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 20px;
        fill: #ffffff;
      }
      
      .desc {
        font-family: 'Outfit', sans-serif;
        font-weight: 400;
        font-size: 13px;
        fill: #98a6b8;
      }
      
      .tech {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #00f2fe;
      }
      
      .status {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #ffb199;
      }

      .card-bg {
        fill: #0d1117;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 1.5;
        rx: 12px;
      }

      .glow {
        filter: blur(15px);
        opacity: 0.15;
      }
    </style>
    
    <linearGradient id="glowGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>
  </defs>

  <!-- Glowing background -->
  <rect x="10" y="10" width="380" height="140" fill="url(#glowGrad4)" class="glow" rx="12" />
  
  <!-- Base Card -->
  <rect x="0" y="0" width="400" height="160" class="card-bg" />

  <!-- Content -->
  <g transform="translate(24, 28)">
    <!-- Icon/Emblem -->
    <rect width="36" height="36" rx="8" fill="rgba(0, 242, 254, 0.1)" stroke="rgba(0, 242, 254, 0.3)" stroke-width="1" />
    <!-- Colab / Notebook double ring symbol -->
    <circle cx="18" cy="18" r="7" stroke="#00f2fe" stroke-width="2" fill="none" />
    <circle cx="23" cy="18" r="4" fill="#ffb199" />

    <!-- Project Info -->
    <text x="50" y="24" class="title">Biocolabs</text>
    <text x="290" y="22" class="status">● Interactive</text>

    <text x="0" y="62" class="desc">Interactive Colab notebooks demonstrating deep learning</text>
    <text x="0" y="80" class="desc">applications for structural computational biology.</text>

    <!-- Tech Stack Pill -->
    <g transform="translate(0, 102)">
      <rect width="352" height="24" rx="6" fill="#161b22" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
      <text x="12" y="16" class="tech">Google Colab • Python • PyTorch • NumPy</text>
    </g>
  </g>
</svg>
