<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 20px;
        fill: #ffffff;
      }
      
      .desc {
        font-family: 'Outfit', sans-serif;
        font-weight: 400;
        font-size: 13px;
        fill: #98a6b8;
      }
      
      .tech {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #b800ff;
      }
      
      .status {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #00f2fe;
      }

      .card-bg {
        fill: #0d1117;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 1.5;
        rx: 12px;
      }

      .glow {
        filter: blur(15px);
        opacity: 0.15;
      }
    </style>
    
    <linearGradient id="glowGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b800ff" />
      <stop offset="100%" stop-color="#ff0844" />
    </linearGradient>
  </defs>

  <!-- Glowing background -->
  <rect x="10" y="10" width="380" height="140" fill="url(#glowGrad3)" class="glow" rx="12" />
  
  <!-- Base Card -->
  <rect x="0" y="0" width="400" height="160" class="card-bg" />

  <!-- Content -->
  <g transform="translate(24, 28)">
    <!-- Icon/Emblem -->
    <rect width="36" height="36" rx="8" fill="rgba(184, 0, 255, 0.1)" stroke="rgba(184, 0, 255, 0.3)" stroke-width="1" />
    <!-- Secondary structure beta sheet symbol -->
    <path d="M 10,12 L 18,28 L 24,12 L 30,28" stroke="#b800ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Project Info -->
    <text x="50" y="24" class="title">Structure Prediction</text>
    <text x="270" y="22" class="status">● Open Source</text>

    <text x="0" y="62" class="desc">Workflows for all-atom structure prediction. Open source</text>
    <text x="0" y="80" class="desc">contributions to boltz.py &amp; chai-1.py running on Modal.</text>

    <!-- Tech Stack Pill -->
    <g transform="translate(0, 102)">
      <rect width="352" height="24" rx="6" fill="#161b22" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
      <text x="12" y="16" class="tech">Python • PyTorch • Chai-1 • Boltz • Modal</text>
    </g>
  </g>
</svg>
